name: Pylint

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install -r requirements.txt
    - name: Lint app.py (solo errores fatales)
      run: |
        pylint app.py --disable=all --enable=E --exit-zero
    - name: Verificar que la app carga correctamente
      run: |
        python -c "
        from buscador_noticias import buscar_noticias, GeneradorExcelIDEAS, CATEGORIAS_GUI, MAPA_CATEGORIAS, FUENTES_RSS
        print(f'✅ Motor cargado: {len(FUENTES_RSS)} feeds, {len(CATEGORIAS_GUI)} categorías')
        print(f'✅ Dominios permitidos cargados correctamente')
        "
